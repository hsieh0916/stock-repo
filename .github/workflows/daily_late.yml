name: daily-update-late

# 補跑：部分 ETF 官網在 18:30 後才更新，20:30 再抓一次。
# 12:30 UTC = 20:30 台北時間（週一~週五）。
# 不重發通知（通知已在 18:30 的 daily-update 發出）。
on:
  schedule:
    - cron: '30 12 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-update   # 與主 workflow 共用，避免同時執行
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Fetch + rebuild dataset (no notify)
        run: python pipeline/daily.py --no-notify

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ web/public/dataset.json web/public/dataset_00981A.json web/public/dataset_00982A.json web/public/dataset_00980A.json web/public/dataset_00988A.json web/public/dataset_00990A.json web/public/dataset_00994A.json web/public/sectors.json web/public/prices.json
          if git diff --cached --quiet; then
            echo "no new data"
          else
            git commit -m "data: late update [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build site
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
